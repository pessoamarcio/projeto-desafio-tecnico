spring.application.name=pessoa

# Default: MySQL
# Observacao: MySQL Workbench e apenas um cliente GUI; a aplicacao conecta no MySQL Server.
# Ajuste host/porta/schema/usuario/senha conforme sua instalacao.
spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/sistema_gestao?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC}
spring.datasource.username=${DB_USER:root}
spring.datasource.password=${DB_PASS:1234}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.open-in-view=false

# OpenAPI/Swagger
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
