spring.application.name=pessoa
# Tests run against an in-memory database to avoid requiring a local MySQL server.
spring.datasource.url=jdbc:h2:mem:pessoa_test;MODE=MySQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.open-in-view=false

